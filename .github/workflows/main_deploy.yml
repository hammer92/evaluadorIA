name: Deploy Full Firebase Stack (MANUAL ONLY)

# Workflow DESACTIVADO - deploy manual desde este equipo.
# Para deployar, ejecutar localmente:
#   pnpm build
#   firebase deploy --only functions --force --project agente-entrevistador-ia
#   firebase deploy --only hosting --project agente-entrevistador-ia
#   firebase deploy --only firestore,storage --project agente-entrevistador-ia
#   gcloud run services update <FN> --region us-central1 \
#     --env-vars-file /tmp/cf_envvars.yaml --project agente-entrevistador-ia

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm manual deploy'
        required: true
        default: ''

jobs:
  deploy:
    if: github.event.inputs.confirm == 'DEPLOY'
    name: Deploy to Firebase (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install & Build Web
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_ENV: prod
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Auth to GCP for firebase + gcloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy functions (code)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --non-interactive --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set env vars on CF runtime via gcloud run services update
        run: |
          cat > /tmp/cf_envvars.yaml <<EOF
          SESSION_COOKIE_SECRET: "$SESSION_COOKIE_SECRET"
          ALLOWED_ORIGINS: "$ALLOWED_ORIGINS"
          REPOSITORY_DRIVER: "firebase"
          FIREBASE_ADMIN_PROJECT_ID: "$FIREBASE_ADMIN_PROJECT_ID"
          OPENAI_API_KEY: "$OPENAI_API_KEY"
          EOF
          for FN in \
            v1-users-create \
            v1-users-delete \
            v1-users-list \
            v1-users-update \
            v1-users-set-role \
            v1-auth-sign-up \
            v1-reports-generate; do
            echo "→ Updating $FN..."
            gcloud run services update "$FN" \
              --project=agente-entrevistador-ia \
              --region=us-central1 \
              --env-vars-file=/tmp/cf_envvars.yaml \
              --quiet || echo "::warning::Failed $FN"
          done
        env:
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deploy static (Hosting)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia

      - name: Deploy rules (Firestore + Storage)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore,storage --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia
