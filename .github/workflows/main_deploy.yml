name: Deploy Full Firebase Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- BLOQUE FRONTEND (WEB) ---
      - name: Install & Build Web
        run: pnpm build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      # --- BLOQUE DESPLIEGUE ---
      # firebase-tools v15+ ya no propaga process.env del container al child
      # process que parsea los triggers de las CFs. Tampoco acepta --set-env-vars
      # en `deploy --only functions`. Solución en dos pasos:
      #
      #   1) DEPLOY-TIME ANALYSIS (descubrir triggers de las CFs):
      #      firebase-tools v15+ carga archivos `.env*` del directorio source
      #      de las CFs y los inyecta como env vars al child process que corre
      #      el código para descubrir triggers. Escribimos apps/functions/.env
      #      desde GitHub Secrets ANTES del deploy para que env.ts (que lee de
      #      process.env) pase la validación Zod al cargar los modulos.
      #      Ver: src/functions/env.ts::loadUserEnvs() en firebase-tools v15+.
      #
      #   2) RUNTIME (CFs ejecutandose en GCP):
      #      gcloud functions deploy FN --update-env-vars=KEY=VAL,... setea
      #      env vars en el service config del CF runtime. process.env los lee
      #      cuando se ejecuta la CF (NO en deploy-time analysis).
      #
      # env.ts sigue siendo el mismo: solo lee de process.env (sin cambios).
      # API expuesta a las CFs (apps/functions/src/env.ts):
      #   env.SESSION_COOKIE_SECRET
      #   env.ALLOWED_ORIGINS
      #   env.REPOSITORY_DRIVER (default: 'firebase')
      #   env.FIREBASE_ADMIN_PROJECT_ID
      #   env.OPENAI_API_KEY
      #   env.NODE_ENV (auto-set por CF runtime a 'production')
      - name: Write apps/functions/.env from secrets (for deploy-time discovery)
        working-directory: apps/functions
        run: |
          {
            printf 'SESSION_COOKIE_SECRET=%s\n' "$SESSION_COOKIE_SECRET"
            printf 'ALLOWED_ORIGINS=%s\n'      "$ALLOWED_ORIGINS"
            printf 'REPOSITORY_DRIVER=firebase\n'
            printf 'FIREBASE_ADMIN_PROJECT_ID=%s\n' "$FIREBASE_ADMIN_PROJECT_ID"
            printf 'OPENAI_API_KEY=%s\n'       "$OPENAI_API_KEY"
          } > .env
        env:
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deploy functions (code via firebase deploy)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia

      - name: Auth to GCP for gcloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set env vars on CF runtime via gcloud --env-vars-file
        run: |
          # Usa --env-vars-file (YAML) en vez de --update-env-vars=KEY=VAL,KEY=VAL
          # para evitar problemas de escaping cuando un valor (ej. ALLOWED_ORIGINS)
          # contiene comas. gcloud acepta YAML con KEY: "VALUE" por entrada.
          cat > /tmp/cf_envvars.yaml <<EOF
          SESSION_COOKIE_SECRET: "$SESSION_COOKIE_SECRET"
          ALLOWED_ORIGINS: "$ALLOWED_ORIGINS"
          REPOSITORY_DRIVER: "firebase"
          FIREBASE_ADMIN_PROJECT_ID: "$FIREBASE_ADMIN_PROJECT_ID"
          OPENAI_API_KEY: "$OPENAI_API_KEY"
          EOF

          REGION="us-central1"
          PROJECT="agente-entrevistador-ia"

          # Sincroniza env vars en TODAS las CFs (gcfv2). El runtime service
          # config es donde process.env los lee cuando la CF se ejecuta.
          for FN in \
            v1UsersCreate \
            v1UsersDelete \
            v1UsersList \
            v1UsersUpdate \
            v1UsersSetRole \
            v1AuthClearSession \
            v1AuthCreateSession \
            v1AuthSignUp \
            v1ReportsGenerate \
            ssr; do
            echo "→ Updating $FN env vars..."
            gcloud functions deploy "$FN" \
              --project="$PROJECT" \
              --region="$REGION" \
              --env-vars-file=/tmp/cf_envvars.yaml \
              --quiet || echo "::warning::Failed to update $FN (skipping)"
          done
        env:
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deploy static + rules (Hosting + Firestore + Storage)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore,storage --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia

      - name: Post-deploy smoke test (Hosting URL reachable)
        if: success()
        run: |
          URL="https://agente-entrevistador-ia.web.app"
          echo "Smoke-testing $URL ..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 "$URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Smoke test failed for $URL (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Smoke test OK ($URL → HTTP $HTTP_STATUS)"
