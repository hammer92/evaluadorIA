name: Deploy Full Firebase Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- BLOQUE FRONTEND (WEB) ---
      - name: Install & Build Web
        run: pnpm build
        env:
          # Inyectar config de Firebase para el build de la web
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      # --- BLOQUE DESPLIEGUE FINAL ---
      # firebase-tools v15+ removio `--set-env-vars` del top-level `deploy`.
      # Workaround oficial de w9jds/firebase-action@master:
      #   1. `FIREBASE_CLI_EXPERIMENTS=legacyRuntimeConfigCommands` habilita
      #      `firebase functions:config:set` (gated por experimento en v15+).
      #   2. `CONFIG_VALUES` la accion ejecuta `firebase functions:config:set
      #      $CONFIG_VALUES` ANTES del deploy, escribiendo a Firebase Runtime
      #      Config API. Las CFs leen los valores via `functions.config()`.
      #   3. Los secrets viven en GitHub Secrets (single source of truth);
      #      el workflow los inyecta aqui y la accion los propaga al deploy.
      #
      # API expuesta a las CFs (apps/functions/src/env.ts):
      #   env.SESSION_COOKIE_SECRET      <- functions.config().session.cookie_secret
      #   env.ALLOWED_ORIGINS            <- functions.config().allowed.origins
      #   env.REPOSITORY_DRIVER          <- functions.config().repository.driver
      #   env.FIREBASE_ADMIN_PROJECT_ID  <- functions.config().admin.project_id
      #   env.OPENAI_API_KEY             <- functions.config().openai.api_key
      #   env.NODE_ENV                   <- process.env.NODE_ENV (auto en CF runtime)
      #
      # El top-level `firebase deploy` (sin --only) cubre hosting, firestore,
      # storage y functions en una sola pasada.
      - name: Deploy functions (env vars via CONFIG_VALUES)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia
          # Tambien en process.env del container (no llegan a las CFs en v15+;
          # las CFs leen de functions.config() por CONFIG_VALUES).
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPOSITORY_DRIVER: firebase

      - name: Deploy static + rules (Hosting + Firestore + Storage)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore,storage --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: agente-entrevistador-ia

      - name: Post-deploy smoke test (Hosting URL reachable)
        if: success()
        run: |
          URL="https://agente-entrevistador-ia.web.app"
          echo "Smoke-testing $URL ..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 "$URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Smoke test failed for $URL (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Smoke test OK ($URL → HTTP $HTTP_STATUS)"
